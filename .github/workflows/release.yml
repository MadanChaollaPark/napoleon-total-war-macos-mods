name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python3 -m unittest discover -s tests -v
      - name: Build separate release archives
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          python3 tools/build_release.py "$VERSION" --output dist/release
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/release/* --generate-notes --title "$GITHUB_REF_NAME"

